name: Notarial Document Intelligence Real Services

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/notarial-document-intelligence-real.yml"
      - "docker-compose.yml"
  workflow_dispatch:

jobs:
  real-services:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: easypro2
          POSTGRES_USER: easypro2
          POSTGRES_PASSWORD: easypro2
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U easypro2 -d easypro2"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg2://easypro2:easypro2@127.0.0.1:5432/easypro2
      REDIS_URL: redis://127.0.0.1:6379/0
      CELERY_BROKER_URL: redis://127.0.0.1:6379/0
      CELERY_RESULT_BACKEND: redis://127.0.0.1:6379/1
      SECRET_KEY: ci-not-secret
      ENVIRONMENT: test
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "backend/requirements.txt"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Bootstrap legacy base schema
        working-directory: backend
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text
          import os

          engine = create_engine(os.environ["DATABASE_URL"])
          statements = [
              """
              create table if not exists roles (
                  id serial primary key,
                  code varchar(50) not null unique,
                  name varchar(80) not null unique,
                  scope varchar(30) not null default 'notary',
                  description varchar(255) not null default '',
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists users (
                  id serial primary key,
                  email varchar(120) not null unique,
                  full_name varchar(160) not null,
                  password_hash varchar(255) not null,
                  is_active boolean not null default true,
                  default_notary_id integer null,
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists notaries (
                  id serial primary key,
                  slug varchar(80) not null unique,
                  catalog_identity_key varchar(255) not null unique,
                  commercial_name varchar(120) not null,
                  legal_name varchar(160) not null,
                  department varchar(80) not null default 'Antioquia',
                  municipality varchar(120) not null,
                  notary_label varchar(160) not null,
                  logo_url varchar(255) null,
                  primary_color varchar(20) not null default '#0D2E5D',
                  secondary_color varchar(20) not null default '#4D5B7C',
                  base_color varchar(20) not null default '#F4F7FB',
                  accent_color varchar(20) not null default '#50D690',
                  city varchar(80) not null,
                  address varchar(255) null,
                  phone text null,
                  email varchar(120) null,
                  current_notary_name varchar(160) null,
                  business_hours text null,
                  institutional_data text not null default '',
                  commercial_status varchar(40) not null default 'prospecto',
                  commercial_owner varchar(120) null,
                  commercial_owner_user_id integer null,
                  main_contact_name varchar(160) null,
                  main_contact_title varchar(120) null,
                  commercial_phone text null,
                  commercial_email varchar(120) null,
                  last_management_at timestamptz null,
                  next_management_at timestamptz null,
                  commercial_notes text null,
                  priority varchar(20) not null default 'media',
                  lead_source varchar(120) null,
                  potential varchar(40) null,
                  internal_observations text null,
                  is_active boolean not null default true,
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists role_assignments (
                  id serial primary key,
                  user_id integer not null,
                  role_id integer not null,
                  notary_id integer null,
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists persons (
                  id serial primary key,
                  document_type varchar(40) not null,
                  document_number varchar(40) not null,
                  full_name varchar(160) not null,
                  sex varchar(20) null,
                  nationality varchar(80) null,
                  marital_status varchar(40) null,
                  profession varchar(120) null,
                  municipality varchar(120) null,
                  is_transient boolean not null default false,
                  phone varchar(40) null,
                  address varchar(255) null,
                  email varchar(120) null,
                  metadata_json text not null default '{}',
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists cases (
                  id serial primary key,
                  notary_id integer not null,
                  template_id integer null,
                  created_by_user_id integer null,
                  case_type varchar(80) not null,
                  act_type varchar(120) not null,
                  consecutive integer not null,
                  year integer not null,
                  internal_case_number varchar(40) null,
                  official_deed_number varchar(40) null,
                  official_deed_year integer null,
                  current_state varchar(50) not null,
                  current_owner_user_id integer null,
                  client_user_id integer null,
                  protocolist_user_id integer null,
                  approver_user_id integer null,
                  titular_notary_user_id integer null,
                  substitute_notary_user_id integer null,
                  requires_client_review boolean not null default false,
                  final_signed_uploaded boolean not null default false,
                  approved_at timestamptz null,
                  approved_by_user_id integer null,
                  approved_by_role_code varchar(80) null,
                  approved_document_version_id integer null,
                  metadata_json text not null default '{}',
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
              """
              create table if not exists case_participants (
                  id serial primary key,
                  case_id integer not null,
                  person_id integer not null,
                  role_code varchar(80) not null,
                  role_label varchar(120) not null,
                  snapshot_json text not null default '{}',
                  created_at timestamptz not null default current_timestamp,
                  updated_at timestamptz not null default current_timestamp
              )
              """,
          ]
          with engine.begin() as conn:
              for statement in statements:
                  conn.execute(text(statement))
          PY

      - name: Alembic upgrade on PostgreSQL pgvector
        working-directory: backend
        run: alembic upgrade head

      - name: Verify vector extension and HNSW index
        working-directory: backend
        run: |
          python - <<'PY'
          from sqlalchemy import create_engine, text
          import os
          engine = create_engine(os.environ["DATABASE_URL"])
          with engine.connect() as conn:
              assert conn.execute(text("select extname from pg_extension where extname='vector'")).scalar_one() == "vector"
              idx = conn.execute(text("""
                  select indexdef
                  from pg_indexes
                  where tablename='notarial_document_embeddings'
                    and indexname='ix_notarial_embeddings_embedding_hnsw'
              """)).scalar_one()
              assert "hnsw" in idx.lower()
              assert "vector_cosine_ops" in idx
          PY

      - name: Start Celery worker
        working-directory: backend
        run: |
          celery -A app.workers.celery_app:celery_app worker -Q notarial-documental,notarial-intelligence --pool=solo --loglevel=INFO > ../celery-worker.log 2>&1 &
          echo $! > ../celery-worker.pid
          python - <<'PY'
          import subprocess, time
          deadline = time.time() + 60
          while time.time() < deadline:
              result = subprocess.run(
                  ["celery", "-A", "app.workers.celery_app:celery_app", "inspect", "ping"],
                  text=True,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
              )
              if "pong" in result.stdout:
                  print(result.stdout)
                  break
              time.sleep(2)
          else:
              raise SystemExit("Celery worker did not respond to ping")
          PY

      - name: Real service validation
        working-directory: backend
        run: python -m app.tests.real_notarial_document_intelligence_check

      - name: Backend test suite
        working-directory: backend
        run: python -m pytest app/tests -q

      - name: Celery worker log on failure
        if: failure()
        run: cat celery-worker.log || true
