  :root{ --paper:#FBFAF7; --ink:#1B1E23; --ink-soft:#4A5058; --chrome:#26314B; --accent:#31456E; --line:#E4E1D8; --gold:#C9A400; }

  .stage{flex:1;position:relative;min-height:0;}

</style>
