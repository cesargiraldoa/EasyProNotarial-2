<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Motor de Biblioteca</title>
  <style>
    :root{--navy:#0d2e5d;--green:#059669;--red:#dc2626;--gray:#6b7280;--line:#e5e7eb;--soft:#f3f4f6;--text:#111827}
    *{box-sizing:border-box}body{margin:0;background:#fff;color:var(--text);font:13px system-ui,sans-serif}.header{background:var(--navy);color:#fff;padding:12px}.title{font-size:14px;font-weight:700}.subtitle,.hint,.footer{font-size:11px}.subtitle{margin-top:3px;opacity:.78}.section{padding:8px 12px}.btn{border:0;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;padding:8px 10px}.btn:disabled{cursor:not-allowed;opacity:.65}.btn-primary{width:100%;background:var(--navy);color:#fff}.btn-yes{background:var(--green);color:#fff}.btn-no{background:#fff;border:1px solid var(--red);color:var(--red)}.hint{margin-top:6px;color:var(--gray)}#estado{display:none;margin:8px 12px;border-radius:8px;padding:8px;background:var(--soft);color:var(--gray)}#estado.error{background:#fef2f2;color:var(--red)}#estado.ok{background:#ecfdf5;color:var(--green)}#sugerencias{display:none;padding:8px 12px}.section-title{display:flex;align-items:center;gap:6px;font-weight:700;margin-bottom:8px}.counter{background:#dbeafe;border-radius:999px;color:var(--navy);font-size:11px;font-weight:700;padding:2px 7px}.sugerencias-list{max-height:290px;overflow-y:auto}.sugerencia-card{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;padding:8px}.texto-original{font-weight:700;word-break:break-word}.campo-sugerido{color:var(--navy);font-size:12px;font-weight:700;margin-top:3px;word-break:break-word}.badges{display:flex;gap:5px;margin-top:7px}.badge{border-radius:999px;background:#f3f4f6;color:#4b5563;font-size:10px;font-weight:700;padding:2px 7px}.actions{display:flex;gap:6px;margin-top:8px}.actions .btn{flex:1;padding:6px 8px}.separator{border-top:1px solid var(--line);margin:8px 12px}.search{border:1px solid var(--line);border-radius:8px;font-size:12px;margin-bottom:8px;outline:none;padding:8px;width:100%}.lista-campos{max-height:210px;overflow-y:auto}.campo-item{border:1px solid var(--line);border-radius:8px;cursor:pointer;margin-bottom:6px;padding:7px 8px}.campo-code{color:var(--navy);font-size:11px;font-weight:700}.campo-label,.empty-state{color:var(--gray);font-size:11px}.change-panel{display:none;border-top:1px solid var(--line);padding:8px 12px}.change-panel.visible{display:block}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.footer{color:var(--gray);padding:10px 12px 12px;text-align:center}
  </style>
</head>
<body>
  <div class="header"><div class="title">Motor de Biblioteca</div><div class="subtitle">Ecosistema Notarial · LLM-first</div></div>
  <div class="section"><button class="btn btn-primary" id="btnAnalizar" type="button">Analizar documento</button><div class="hint">Lee el documento completo y prepara una versión de revisión estructurada.</div></div>
  <div id="estado"></div>
  <div id="sugerencias"><div class="section-title"><span>Campos sugeridos</span><span class="counter" id="contador">0</span></div><div class="sugerencias-list" id="listaSugerencias"></div><div class="empty-state" id="diagnosticoMotor" style="display:none"></div></div>
  <div class="separator"></div>
  <div class="change-panel" id="panelCambio"><div class="section-title">Cambiar sugerencia</div><input id="campoCambioBuscar" class="search" placeholder="Filtrar campo existente..."/><select id="campoCambioSelect" class="search"></select><button class="btn btn-primary" id="btnAsignarCampo" type="button">Asignar campo existente</button><div class="hint">Crear campo nuevo</div><input id="nuevoCampoCode" class="search" placeholder="CÓDIGO"/><input id="nuevoCampoLabel" class="search" placeholder="Nombre visible"/><div class="field-row"><input id="nuevoCampoCategory" class="search" placeholder="categoría"/><input id="nuevoCampoType" class="search" placeholder="text"/></div><button class="btn btn-primary" id="btnCrearCampo" type="button">Crear y asignar</button><button class="btn" id="btnCancelarCambio" type="button">Cancelar</button></div>
  <div class="separator"></div>
  <div class="section"><div class="section-title">Insertar campo</div><input id="buscarCampo" class="search" placeholder="Buscar campo..."/><div id="listaCampos" class="lista-campos"></div></div>
  <div class="footer">Motor de Biblioteca v2.1.1</div>
  <script type="text/javascript" src="../v1/plugins.js"></script>
  <script>
    window.EASYPRO_ONLYOFFICE_PLUGIN_CONFIG = Object.assign(
      {},
      window.EASYPRO_ONLYOFFICE_PLUGIN_CONFIG || {},
      { analysisTimeoutMs: 300000 }
    );
  </script>
  <script src="plugin.js?v=2.1.1"></script>
</body>
</html>
